<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Bouncer - AI Data Gatekeeper</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="../../assets/icons/icon-48.png" alt="Bouncer" class="logo-icon">
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Current Page Info -->
      <div class="page-info" id="pageInfo">
        <div class="page-favicon">
          <img src="" alt="" id="pageFavicon">
        </div>
        <div class="page-details">
          <h2 class="page-title" id="pageTitle">Loading...</h2>
          <p class="page-url" id="pageUrl"></p>
        </div>
      </div>

      <!-- Action Button -->
      <div class="action-section">
        <button class="btn-primary" id="scrapeButton">
          <span id="buttonText">Convert</span>
        </button>

        <div class="progress-bar hidden" id="progressBar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- Results Area -->
      <div class="results-section hidden" id="resultsSection">
        <!-- Redaction Summary -->
        <div class="redaction-summary" id="redactionSummary">
          <div class="summary-icon" id="summaryIcon">
            <!-- Checkmark icon (default, shown when PII detection is enabled) -->
            <svg class="icon-protected" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
              <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <!-- Exclamation mark icon (shown when PII detection is disabled) -->
            <svg class="icon-warning hidden" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
              <path d="M12 8V12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="16" r="0.5" fill="currentColor" stroke="currentColor" stroke-width="1"/>
            </svg>
          </div>
          <div class="summary-text">
            <h3 class="summary-title" id="summaryTitle">Protected</h3>
            <p class="summary-details" id="summaryDetails">No sensitive data detected</p>
          </div>
        </div>

        <!-- Redaction Details (Collapsible) -->
        <div class="redaction-details hidden" id="redactionDetails">
          <button class="details-toggle" id="detailsToggle">
            <span>View Redacted Items</span>
            <svg class="toggle-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="details-content hidden" id="detailsContent">
            <ul class="redacted-list" id="redactedList">
              <!-- Items will be injected here -->
            </ul>
          </div>
        </div>

        <!-- Markdown Preview -->
        <div class="markdown-preview">
          <div class="preview-header">
            <h3>Markdown Output</h3>
          </div>
          <div class="preview-content" id="previewContent">
            <textarea class="preview-markdown" id="markdownPreview" rows="15" placeholder="Scraped markdown will appear here..."></textarea>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="btn-success" id="copyButton">
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M6 6V4a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2h-2" stroke="currentColor" stroke-width="2"/>
              <rect x="2" y="6" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span id="copyButtonText">Copy</span>
          </button>

          <button class="btn-secondary" id="downloadButton">
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 3v10m0 0l-4-4m4 4l4-4M3 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="downloadButtonText">Download</span>
          </button>
        </div>
      </div>

      <!-- Settings Link -->
      <div class="footer-section">
        <button class="btn-text" id="settingsButton">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 1v2m0 10v2M15 8h-2M3 8H1m11.5-5.5l-1.4 1.4M5.9 10.1l-1.4 1.4m9-1.4l-1.4-1.4M5.9 5.9L4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Settings
        </button>
        <div class="version-info"><!-- Populated by JS --></div>
      </div>
    </main>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
